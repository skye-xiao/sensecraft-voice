name: sensecraft_voice
description: >-
  SenseCraft Voice SDK for Flutter — connect to SenseCraft Voice (Clip) devices
  over BLE, send AT commands, receive recording files, and run OTA firmware
  updates. UI- and backend-agnostic.
version: 0.1.0
homepage: https://github.com/Seeed-Studio/sensecraft-voice-sdk
publish_to: 'none' # Set to omit `publish_to` when publishing to pub.dev.

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE transport
  flutter_blue_plus: ^1.36.1
  permission_handler: ^11.4.0

  # OTA firmware update (SMP/mcumgr over BLE)
  mcumgr_flutter: ^0.8.1
  flutter_archive: ^6.0.3
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # WiFi hotspot connection (AP-mode high-speed file transfer)
  wifi_iot: ^0.3.19+1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # Pure-Dart plugin: no assets / no platform code of its own.
  # Platform permissions (BLE / Location / Local Network) must be declared
  # by the host app — see README "Platform setup".
