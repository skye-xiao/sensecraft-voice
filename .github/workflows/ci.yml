name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install SDK dependencies
        run: flutter pub get

      - name: Dart analyze (SDK)
        run: dart analyze --fatal-infos

      - name: Flutter test (SDK)
        run: flutter test

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Dart analyze (example)
        working-directory: example
        run: dart analyze --fatal-infos
