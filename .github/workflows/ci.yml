name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter SDK and example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install SDK dependencies
        working-directory: sdk/flutter
        run: flutter pub get
      - name: Analyze SDK
        working-directory: sdk/flutter
        run: flutter analyze --fatal-infos
      - name: Test SDK
        working-directory: sdk/flutter
        run: flutter test
      - name: Install example dependencies
        working-directory: sdk/flutter/example
        run: flutter pub get
      - name: Analyze example
        working-directory: sdk/flutter/example
        run: flutter analyze --fatal-infos
      - name: Test example
        working-directory: sdk/flutter/example
        run: flutter test

  android:
    name: Android SDK and sample
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test SDK and build sample
        working-directory: sdk/android
        run: ./gradlew test :sample:assembleDebug

  ios:
    name: iOS SDK and sample
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test Swift package
        working-directory: sdk/ios
        run: swift test
      - name: Build iOS sample
        run: >
          xcodebuild
          -project sdk/ios/Examples/iOSVerifyApp/SenseCraftVoiceVerifyApp.xcodeproj
          -scheme SenseCraftVoiceVerifyApp
          -sdk iphonesimulator
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          build
